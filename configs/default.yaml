# VlogAgent 默认配置

# LLM API 配置（阿里云百炼，按优先级自动降级）
openai:
  api_key: "sk-85491afc6fd747568bd593357f15c5eb"           # 填入阿里云百炼 API Key，或设置环境变量 OPENAI_API_KEY
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # 模型优先级列表：第一个配额用尽后自动切换到下一个
  models:
    - "qwen3-vl-plus-2025-09-23"

# Perceiver 配置
perceiver:
  # 场景分割
  scene_threshold: 27.0          # ContentDetector 阈值
  min_scene_len: 15              # 最小场景帧数

  # 关键帧抽帧（密集帧序列给 VLM 观察）
  keyframe_interval: 2.0         # 每N秒提取1帧（1.0=每秒1帧）
  max_keyframes_per_segment: 10  # 单段最大帧数（控制 token 消耗）

  # 候选指令数
  max_candidates: 15
  min_candidates: 8

  # Whisper ASR
  whisper_model: "base"          # tiny / base / small / medium / large

# Planner (MCTS) 配置
planner:
  mcts_depth: 3                  # 搜索深度
  mcts_simulations: 50           # 模拟次数（本地评估，无 API 成本）
  ucb_c: 1.4                     # UCB 探索系数
  top_k: 3                       # 返回 Top-K 方案

# Executor 配置
executor:
  ffmpeg_path: "ffmpeg"          # FFmpeg 可执行文件路径
  ffprobe_path: "ffprobe"
  temp_dir: "output/temp"
  # 工具参数范围
  brightness_range: [-0.3, 0.3]
  contrast_range: [0.5, 2.0]
  saturation_range: [0.5, 2.0]
  denoise_strength_range: [1, 10]
  sharpen_range: [0.5, 3.0]
  stabilize_smoothing: [5, 30]

# Evaluator 配置
evaluator:
  # 各维度权重（参考 PhotoAgent：美学为主，技术指标为辅）
  weights:
    visual_quality: 0.10
    content_fidelity: 0.15
    inter_segment_consistency: 0.10
    audio_integrity: 0.05
    aesthetic: 0.60

  # CLIP 模型
  clip_model: "ViT-B-32"
  clip_pretrained: "openai"

  # 闭环控制
  min_improvement: 0.01          # 最小提升阈值
  max_no_improve_rounds: 2       # 连续无提升轮数上限

# Agent 主循环
agent:
  max_iterations: 3              # 最大闭环迭代次数
