# VlogAgent 默认配置

# LLM API 配置（vLLM 自部署 Qwen2.5-VL-72B）
openai:
  api_key: "not-needed"                                     # vLLM 不校验 API Key，填任意值
  base_url: "http://localhost:8000/v1"                     # 通过 SSH 隧道连接云服务器
  models:
    - "qwen2.5-vl"                                          # 对应 --served-model-name

# Perceiver 配置
perceiver:
  # 场景分割
  scene_threshold: 27.0          # ContentDetector 阈值
  min_scene_len: 15              # 最小场景帧数

  # 关键帧抽帧（密集帧序列给 VLM 观察）
  keyframe_interval: 2.0         # 每N秒提取1帧（1.0=每秒1帧）
  max_keyframes_per_segment: 10  # 单段最大帧数（控制 token 消耗）

  # 候选指令数
  max_candidates: 15
  min_candidates: 8

  # Whisper ASR
  whisper_model: "base"          # tiny / base / small / medium / large
  skip_whisper: true             # 跳过 ASR 加速（无语音视频建议开启）

# Planner 配置（逐阶段视觉预筛选）
planner:
  max_stage_refine: 2            # 每阶段最多重试次数
  max_candidates_per_stage: 3    # 每阶段生成的候选数

# Executor 配置
executor:
  ffmpeg_path: "ffmpeg"          # FFmpeg 可执行文件路径
  ffprobe_path: "ffprobe"
  temp_dir: "output/temp"
  # 工具参数范围
  brightness_range: [-0.3, 0.3]
  contrast_range: [0.5, 2.0]
  saturation_range: [0.5, 2.0]
  denoise_strength_range: [1, 10]
  sharpen_range: [0.5, 3.0]
  stabilize_smoothing: [5, 30]

# Evaluator 配置
evaluator:
  # 各维度权重（参考 PhotoAgent：美学为主，技术指标为辅）
  weights:
    visual_quality: 0.10
    content_fidelity: 0.15
    inter_segment_consistency: 0.10
    audio_integrity: 0.05
    aesthetic: 0.60

  # CLIP 模型
  clip_model: "ViT-B-32"
  clip_pretrained: "openai"

  # 闭环控制
  min_improvement: 0.01          # 最小提升阈值
  max_no_improve_rounds: 2       # 连续无提升轮数上限

# Agent 主循环（双层循环）
agent:
  max_outer_iterations: 2        # 外层循环最大轮数
  max_inner_iterations: 3        # 内层循环最大轮数（已改为逐阶段循环）

# Critic 配置
critic:
  accept_threshold: 0.01         # accept 需要的最小提升
  redirect_after_refines: 2      # 连续 refine 几轮后 redirect
  good_enough_score: 0.85        # 分数达标直接终止
